; SmallTV-Ultra AI Usage Monitor — ESP8266 port of M5Stack ai-usage
;
; Hardware notes (see ../FLASHING.md for full reference):
;   - GeekMagic SmallTV-Ultra: ESP8266, 4 MB flash, ST7789 240x240
;   - Backlight on GPIO5 is ACTIVE-LOW PWM (analogWrite 0 = full bright)
;   - Display REQUIRES tft.invertDisplay(true) after init
;
; Flashing: see FLASHING.md. After first install, OTA via /update endpoint.

[env:nodemcuv2]
platform               = espressif8266
board                  = nodemcuv2
framework              = arduino
board_build.filesystem = littlefs
board_build.ldscript   = eagle.flash.4m1m.ld
board_build.f_cpu      = 160000000L

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    ; --- TFT_eSPI setup for SmallTV-Ultra display ---
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=-1
    -D TFT_DC=0
    -D TFT_RST=2
    -D TFT_BL=5
    -D TOUCH_CS=-1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; --- include search paths (let nested headers be #included by simple name) ---
    -Isrc/core
    -Isrc/data
    -Isrc/channels
    -Isrc/ui

    ; --- Build flavor ---
    -Os
    -D FW_VERSION="\"0.20.2-glimmer\""

monitor_speed = 115200

; OTA upload (manual via curl is simpler; this is a convenience shortcut)
; Use: pio run -e ota -t upload
[env:ota]
extends         = env:nodemcuv2
upload_protocol = espota
upload_port     = smalltv-ai.local
upload_flags    = --port=8266

; ──────────────────────────────────────────────────────────────────────────
; ESP32 port — "Cheap Yellow Display" (ESP32-2432S028R)
;   - ESP32-WROOM-32, 4 MB flash
;   - 240x320 ILI9341 TFT on HSPI, backlight ACTIVE-HIGH PWM on GPIO21
;   - microSD slot (unused by glimmer; firmware lives in internal flash/LittleFS)
;
; Flashing over USB (USB data IS wired on this board, unlike the SmallTV-Ultra):
;   pio run -e cyd -t buildfs       # build LittleFS image (fonts + web UI)
;   pio run -e cyd                  # build firmware
;   pio run -e cyd -t upload        # flash firmware via USB
;   pio run -e cyd -t uploadfs      # flash filesystem via USB
[env:cyd]
platform               = espressif32
board                  = esp32dev
framework              = arduino
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
board_build.f_cpu      = 240000000L
monitor_speed          = 115200
upload_speed           = 460800

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    ; --- TFT_eSPI setup for the CYD ILI9341 panel ---
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D TOUCH_CS=-1
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000

    ; --- include search paths (let nested headers be #included by simple name) ---
    -Isrc/core
    -Isrc/data
    -Isrc/channels
    -Isrc/ui

    ; --- Build flavor ---
    -Os
    -D FW_VERSION="\"1.1.2-clawd-meter\""
